<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#07111d">
  <meta name="description" content="Project Frontier — Julie's personal codex and mission control.">
  <title>Project Frontier</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="foundation.css">
  <link rel="stylesheet" href="codex.css">
  <link rel="stylesheet" href="mission-control.css">
  <link rel="stylesheet" href="components.css">
  <link rel="stylesheet" href="responsive.css">
  <link rel="manifest" href="manifest.webmanifest">
</head>
<body>
  <div id="app" class="app-shell">
    <header class="topbar">
      <button class="brand-button" data-route="cover" aria-label="Go to cover">
        <span class="brand-mark">PF</span>
        <span><strong>PROJECT FRONTIER</strong><small>THE LIVING CODEX</small></span>
      </button>
      <nav class="mode-switcher" aria-label="Primary navigation">
        <button class="mode-button" data-route="contents">Open Codex</button>
        <button class="mode-button active" data-route="mission-control">Mission Control</button>
      </nav>
      <div class="captain-chip">
        <span class="signal-dot"></span>
        <span id="captain-chip-name">Julie</span>
      </div>
    </header>

    <main id="view" tabindex="-1"></main>

    <nav class="mobile-nav" aria-label="Mobile navigation">
      <button data-route="contents">Codex</button>
      <button data-route="quests">Quests</button>
      <button data-route="mission-control">Control</button>
      <button data-route="log">Log</button>
      <button data-route="archive">Archive</button>
    </nav>
  </div>

  <template id="toast-template">
    <div class="toast" role="status"></div>
  </template>

  <script src="campaign.js"></script>
  <script src="storage.js"></script>
  <script src="state.js"></script>
  <script src="router.js"></script>
  <script src="views.js"></script>
  <script src="app.js"></script>
</body>
</html>
